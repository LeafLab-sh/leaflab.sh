<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#081C15"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#74C69D"/>
      <stop offset="100%" stop-color="#2D6A4F"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bgGrad)"/>

  <!-- Leaf body — pointed top, rounded bottom, symmetric -->
  <path d="M 128,220
           C 172,210 212,175 215,135
           C 218,95 193,46 128,26
           C 63,46 38,95 41,135
           C 44,175 84,210 128,220 Z"
        fill="url(#leafGrad)"/>

  <!-- Stem -->
  <path d="M 128,220 C 125,231 121,239 117,247"
        stroke="#52B788" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Center midrib vein -->
  <path d="M 128,216 L 128,36"
        stroke="rgba(255,255,255,0.15)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Heart — white, centered in leaf -->
  <path d="M 128,160
           C 90,141 74,119 74,100
           C 74,82 88,72 102,72
           C 113,72 122,79 128,89
           C 134,79 143,72 154,72
           C 168,72 182,82 182,100
           C 182,119 166,141 128,160 Z"
        fill="white"/>
</svg>
